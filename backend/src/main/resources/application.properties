# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# H2 IN-MEMORY DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:h2:mem:zkpdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# SPRING DATA JPA & HIBERNATE
# ===============================
# Automatically creates the database tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# ===============================
# H2 WEB CONSOLE (For Reviewers)
# ===============================
# Enables a web interface to view the database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console